# Builds an unsigned iOS .ipa on macOS for local re-signing (e.g. Sideloadly on Windows).
# This workflow does not use Apple certificates or GitHub signing secrets.
#
# Limitations:
# - The Xcode "Build Rust Code" phase runs `tauri ios xcode-script`, which talks to a small RPC
#   server started only by `tauri ios build` / `tauri ios dev`. Invoking `xcodebuild` alone will
#   panic (missing *-server-addr file). This workflow therefore uses `tauri ios build --ci`.
# - exportArchive expects signing certs (e.g. "iOS Development") that hosted runners lack; the job
#   then zips the .app from the .xcarchive (still unsigned) for Sideloadly-style re-signing.
# - Optional repo variable IOS_EXPORT_TEAM_ID (10-char Apple Team ID) can improve ExportOptions;
#   IPA output does not require export to succeed.
# - Install the artifact with Sideloadly (or similar); it can re-sign with your Apple ID.

name: iOS unsigned IPA

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-unsigned-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unsigned-ipa:
    runs-on: macos-latest
    timeout-minutes: 120
    env:
      CARGO_TERM_COLOR: always
      HUSKY: '0'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          targets: aarch64-apple-ios

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/readest-app/src-tauri
          key: ios-unsigned

      - name: Install dependencies (monorepo root)
        run: |
          set -euo pipefail
          pnpm install

      - name: Vendor assets (Readest)
        working-directory: apps/readest-app
        run: |
          set -euo pipefail
          pnpm setup-vendors

      - name: Prepare Tauri env for Next build
        working-directory: apps/readest-app
        run: |
          set -euo pipefail
          if [ ! -f .env.tauri ]; then
            cp .env.tauri.example .env.tauri
          fi

      - name: Generate iOS Xcode project (Tauri)
        working-directory: apps/readest-app
        run: |
          set -euo pipefail
          # Strip development team for CI: a team in tauri.conf.json makes Xcode expect
          # provisioning/signing; that clashes with unsigned xcodebuild and yields exit 65.
          # Inline JSON so CI does not depend on an extra tracked file or path resolution.
          pnpm exec tauri ios init --ci --config '{"bundle":{"iOS":{"developmentTeam":null}}}'

      - name: Build frontend (out/ for Tauri bundle)
        working-directory: apps/readest-app
        env:
          # Next.js build can exceed Node's default ~2GB heap on macOS runners (OOM / SIGABRT).
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: |
          set -euo pipefail
          pnpm build

      # Omitting developmentTeam leaves Xcode on automatic signing without a team → build error.
      # Tauri does not inject CODE_SIGNING_ALLOWED=NO here; patch project.pbxproj before ios build.
      - name: Patch iOS Xcode project for unsigned CI
        env:
          # Optional: 10-character Apple Team ID (repo Settings → Variables). Helps ExportOptions;
          # IPA is still produced from .xcarchive when export fails without certs.
          IOS_EXPORT_TEAM_ID: ${{ vars.IOS_EXPORT_TEAM_ID }}
        run: |
          set -euo pipefail
          PBX="$(find "${GITHUB_WORKSPACE}/apps/readest-app/src-tauri/gen/apple" -name project.pbxproj | head -n 1)"
          if [ -z "${PBX}" ] || [ ! -f "${PBX}" ]; then
            echo "project.pbxproj not found under gen/apple"
            exit 1
          fi
          echo "Patching ${PBX}"
          python3 "${GITHUB_WORKSPACE}/apps/readest-app/scripts/patch-ios-pbxproj-unsigned-ci.py" "${PBX}"

      - name: Build iOS and produce unsigned IPA
        working-directory: apps/readest-app
        env:
          CI: true
          NODE_OPTIONS: '--max-old-space-size=8192'
        run: |
          set -euo pipefail
          MERGE_JSON='{"bundle":{"iOS":{"developmentTeam":null}},"build":{"beforeBuildCommand":null}}'

          set +e
          pnpm exec tauri ios build --ci --config "${MERGE_JSON}"
          tauri_exit=$?
          set -e

          ROOT="${GITHUB_WORKSPACE}/apps/readest-app/src-tauri/gen/apple"
          DEST="${GITHUB_WORKSPACE}/readest-unsigned.ipa"
          rm -f "${DEST}"

          IPA_SRC="$(find "${ROOT}" -path "*/build/*" -name "*.ipa" -type f 2>/dev/null | head -n 1 || true)"
          if [ -n "${IPA_SRC}" ] && [ -f "${IPA_SRC}" ]; then
            echo "Using IPA from export: ${IPA_SRC}"
            cp -f "${IPA_SRC}" "${DEST}"
            ls -lh "${DEST}"
            exit 0
          fi

          echo "No exported IPA (tauri ios build exit ${tauri_exit}); packaging .app from .xcarchive"
          DD="${HOME}/Library/Developer/Xcode/DerivedData"
          ARCH="$(find "${ROOT}" "${DD}" -type d -name "*.xcarchive" 2>/dev/null | head -n 1 || true)"
          if [ -z "${ARCH}" ]; then
            echo "No .xcarchive under ${ROOT} or ${DD}; cannot recover unsigned IPA."
            find "${ROOT}" -type f 2>/dev/null | head -n 60 || true
            exit "${tauri_exit}"
          fi

          APP="$(find "${ARCH}/Products/Applications" -maxdepth 1 -type d -name "*.app" 2>/dev/null | head -n 1 || true)"
          if [ -z "${APP}" ]; then
            echo "No .app under ${ARCH}/Products/Applications"
            find "${ARCH}" -type d -name "*.app" 2>/dev/null | head -n 20 || true
            exit "${tauri_exit}"
          fi

          STAGING="$(mktemp -d "${RUNNER_TEMP:-/tmp}/ipa-staging.XXXXXX")"
          trap 'rm -rf "${STAGING}"' EXIT
          mkdir -p "${STAGING}/Payload"
          cp -R "${APP}" "${STAGING}/Payload/"
          ( cd "${STAGING}" && zip -qr "${DEST}" Payload )
          ls -lh "${DEST}"
          echo "Packaged unsigned IPA from ${ARCH} (export step failed or produced no IPA)."

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v5
        with:
          name: readest-ios-unsigned-ipa
          path: readest-unsigned.ipa
          if-no-files-found: error
